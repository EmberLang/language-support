name = "Ember Lockfile"
grammar = "ember_lockfile"
path_suffixes = ["ember.lock"]
first_line_pattern = "^\\s*\\{"
line_comments = []
icon = "ember_lockfile.svg"
tab_size = 2
hard_tabs = false

brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["comment"] },
]

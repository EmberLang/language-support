name = "Ember"
grammar = "ember"
path_suffixes = ["fer"]
line_comments = ["// "]
block_comments = [["/*", "*/"]]
tab_size = 4
hard_tabs = false

brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["string", "comment"] }
]
